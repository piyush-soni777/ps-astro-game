<head>
<meta charset="UTF-8">

<div id="root">

  <!-- HUD -->
  <div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" id="scoreD">0</div></div>
    <div class="hb" style="text-align:center"><div class="hl">Level</div><div class="hv" id="levelD">1</div></div>
    <div class="hb"><div class="hl">Lives</div>
      <div id="livesD"><span class="heart" id="h1">♥</span><span class="heart" id="h2">♥</span><span class="heart" id="h3">♥</span></div>
    </div>
    <div class="hb" style="text-align:right"><div class="hl">Best</div><div class="hv" id="bestD">0</div></div>
  </div>

  <!-- Canvas -->
  <div id="cWrap">
    <canvas id="canvas"></canvas>
    <div id="scanline"></div>
    <div id="lvlBanner"></div>

    <!-- Overlay -->
    <div id="overlay">
      <div class="ot" id="oTitle">ASTRO ATTACK</div>
      <div class="os" id="oSub">Destroy the cosmic invaders</div>
      <div class="ob" id="oScore" style="display:none"></div>
      <button class="sbtn" id="oBtn" onclick="startGame()">LAUNCH MISSION</button>
      <div class="chint">
        <span><span class="key">← →↑↓</span>Move</span>
        <span><span class="key">SPACE</span>Fire</span>
        <span><span class="key">Z</span>Bomb</span>
        <span><span class="key">D-Pad</span>Touch</span>
      </div>
      <div style="margin-top:4px;text-align:center;">
        <div class="slbl">— Made by Piyush Soni —</div>

  <!-- Footer -->
  <div id="footer">
    <span>ARROWS+SPACE</span>
    <span>ASTRO ATTACK v2.0</span>
    <span>Z=BOMB</span>
  </div>

  <!-- Touch Controls -->
  <div id="touchCtrl">
    <div id="dpad">
      <div id="dU" class="dp" data-key="ArrowUp">▲</div>
      <div id="dL" class="dp" data-key="ArrowLeft">◀</div>
      <div id="dC"></div>
      <div id="dR" class="dp" data-key="ArrowRight">▶</div>
      <div id="dD" class="dp" data-key="ArrowDown">▼</div>
    </div>
    <div id="actBtns">
      <div class="abtn" id="bFire">
        <span style="font-size:clamp(14px,5vw,20px)">🔫</span>
        <span style="font-size:clamp(7px,2vw,9px)">FIRE</span>
      </div>
      <div class="abtn" id="bBomb">
        <span style="font-size:clamp(12px,4vw,16px)">💥</span>
        <span style="font-size:clamp(6px,1.8vw,8px)">BOMB</span>

    </div>
